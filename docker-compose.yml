services:
  bot:
    build: .
    image: message-fixer-bot:local
    restart: unless-stopped
    depends_on:
      xray:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_UPDATE_TIMEOUT: ${TELEGRAM_UPDATE_TIMEOUT:-60}
      SOCKS5_PROXY: socks5://xray:1080
      WORK_DIR: /tmp/message-fixer-bot
    tmpfs:
      - /tmp/message-fixer-bot:size=256m,mode=1777
    healthcheck:
      test: ["CMD", "message-fixer-bot", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  xray:
    build:
      context: ./deploy/xray
    image: message-fixer-bot-xray:local
    restart: unless-stopped
    environment:
      VLESS_URL: ${VLESS_URL:?VLESS_URL is required}
      XRAY_LOG_LEVEL: ${XRAY_LOG_LEVEL:-warning}
    expose:
      - "1080"
    healthcheck:
      test: ["CMD-SHELL", "xray version >/dev/null 2>&1 && nc -z 127.0.0.1 1080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
