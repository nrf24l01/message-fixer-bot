apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "message-fixer-bot.fullname" . }}
  labels:
    {{- include "message-fixer-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "message-fixer-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "message-fixer-bot.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: xray-config
          emptyDir: {}
      containers:
        - name: bot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "message-fixer-bot.fullname" . }}
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "message-fixer-bot.secretName" . }}
                  key: TELEGRAM_BOT_TOKEN
          volumeMounts:
            - name: tmp
              mountPath: {{ .Values.config.workDir }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          readinessProbe:
            exec:
              command: ["message-fixer-bot", "-healthcheck"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["message-fixer-bot", "-healthcheck"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        - name: xray
          image: "{{ .Values.xray.image.repository }}:{{ .Values.xray.image.tag }}"
          imagePullPolicy: {{ .Values.xray.image.pullPolicy }}
          ports:
            - name: socks
              containerPort: {{ .Values.xray.socksPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "message-fixer-bot.fullname" . }}
          env:
            - name: VLESS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "message-fixer-bot.secretName" . }}
                  key: VLESS_URL
          volumeMounts:
            - name: xray-config
              mountPath: /etc/xray
          readinessProbe:
            tcpSocket:
              port: socks
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: socks
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.xrayResources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
