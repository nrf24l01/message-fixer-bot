{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "message-fixer-bot.secretName" . }}
  labels:
    {{- include "message-fixer-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: {{ required "secrets.telegramBotToken is required when secrets.create=true" .Values.secrets.telegramBotToken | quote }}
  VLESS_URL: {{ required "secrets.vlessUrl is required when secrets.create=true" .Values.secrets.vlessUrl | quote }}
{{- end }}
