name: Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - "helm/**"
      - ".github/workflows/helm-chart.yml"
      - "deploy/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  chart:
    runs-on: ubuntu-latest
    env:
      CHART_DIR: helm/message-fixer-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint "${CHART_DIR}" -f "${CHART_DIR}/values.example.yaml"

      - name: Render chart
        run: helm template demo "${CHART_DIR}" -f "${CHART_DIR}/values.example.yaml" >/dev/null

      - name: Compute chart package version
        id: version
        shell: bash
        run: |
          BASE_VERSION="$(helm show chart "${CHART_DIR}" | awk '/^version:/{print $2}')"
          CHART_NAME="$(helm show chart "${CHART_DIR}" | awk '/^name:/{print $2}')"
          CHART_VERSION="${BASE_VERSION}"
          echo "chart_name=${CHART_NAME}" >> "${GITHUB_OUTPUT}"
          echo "chart_version=${CHART_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Package chart
        run: |
          mkdir -p .chart-packages
          helm package "${CHART_DIR}" \
            --destination .chart-packages \
            --version "${{ steps.version.outputs.chart_version }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if chart version already exists
        id: exists
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          if helm pull "oci://ghcr.io/${OWNER}/charts/${{ steps.version.outputs.chart_name }}" \
            --version "${{ steps.version.outputs.chart_version }}" \
            --destination /tmp >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Push chart to GHCR (OCI)
        if: steps.exists.outputs.exists == 'false'
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          helm push .chart-packages/*.tgz "oci://ghcr.io/${OWNER}/charts"

      - name: Skip push when version already exists
        if: steps.exists.outputs.exists == 'true'
        run: echo "Chart version already exists in GHCR, skipping push."
