name: Push docker images to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  LONG_IMAGE_TAG: ${{ github.sha }}


jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set short hash
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set REPO_NAME env variable
        run: echo "REPO_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build bot image and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: |
            ghcr.io/${{ env.REPO_NAME }}/bot:latest
            ghcr.io/${{ env.REPO_NAME }}/bot:${{ env.IMAGE_TAG }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build xray image and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: ./deploy/xray
          tags: |
            ghcr.io/${{ env.REPO_NAME }}/xray:latest
            ghcr.io/${{ env.REPO_NAME }}/xray:${{ env.IMAGE_TAG }}
          push: true
          cache-from: type=gha,scope=xray
          cache-to: type=gha,mode=max,scope=xray
